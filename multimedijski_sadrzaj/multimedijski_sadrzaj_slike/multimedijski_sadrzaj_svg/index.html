<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG</title>
</head>
<body>
    <h1>SVG</h1>
    <h2>Pravokutnik</h2>
    <svg width="400px" height="200px" style="background-color:orange ;">
        <rect width="200px" height="100px" x="100" y="50" fill="red" stroke="blue" stroke-width="5"/>
    </svg>
    <br>
    <svg width="400px" height="200px" style="background-color:aqua ;">
        <rect width="200px" height="100px" x="100" y="50" fill="red" stroke="green" stroke-width="5"/>
    </svg>
    <hr>
    <h2>Krug</h2>
    <svg width="400px" height="200px" style="background-color:antiquewhite ;">
        <circle cx="200" cy="100" r="85" fill="red" />
    </svg>
    <br>
    <br>
    <hr>
    <br>
    <h2>Elipsa</h2>
    <svg width="400px" height="200px" style="background-color:antiquewhite ;">
        <ellipse cx="200" cy="100" rx="185" ry="85" fill="yellow" />
    </svg>
    <br>
    <br>
    <hr>
    <br>
    <h2>Linija</h2>
    <svg width="400px" height="200px" style="background-color:antiquewhite ;">
        <line x1="0" y1="0" x2="400" y2="200" stroke="red" stroke-width="3px"/>
    </svg>      
    <br>
    <br>
    <hr>
    <br> 
    <h2>Poligon</h2>
    <svg width="400px" height="200px" style="background-color:antiquewhite ;">
        <polygon points="200,20 140,70 380,180 20,180 70,70" fill="blue" stroke="red" stroke-width="3px"/>
    </svg>
    <br>
    <br>
    <hr>
    <br> 
    <h2>Polilinija</h2>
    <svg width="400px" height="200px" style="background-color:antiquewhite ;">
        <polyline points="20, 20, 60, 20, 60, 40, 100, 40, 100, 60, 140, 60, 140,80" fill="none" stroke="red" stroke-width="7px"/> 
    </svg>
    <br>
    <br>
    <hr>
    <br> 
    <h2>Krivulja</h2>
    <svg width="400px" height="200px" style="background-color:antiquewhite ;">
        <path d="M 20, 20 C 100, 180, 300, 20, 380, 100" fill="none" stroke="red" stroke-width="3px"/>
    </svg>
    <br>
    <br>
    <hr>
    <br> 
    <h2>Tekst</h2>
    <svg width="400px" height="200px" style="background-color:antiquewhite ;">
        <text x="10" y="30" fill="red" font-size="30px" font-style="italic" font-family="serif">
            Lorem ipsum
        </text> 
        <line x1="10" y1="40" x2="166" y2="40" stroke="blue" stroke-width="3px"/>
    </svg>
</body>
</html>
