<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- oba elementa podebljavaju tekst, ali strong element
     ima semantičku ulogu pri čemu se te riječii uključuju u 
     SEO odnosno u tražilice preglednika-->
     <b>podebljani tekst </b><br>
    <b>podebljani tekst </b><br>
    <strong>podebljani tekst </strong><br>
    <!-- Oba elemnta kose slova, samo em daje na važnosti i ima 
     ulogu u SEO-u -->
    <i>ukosena slova </i><br>
    <em>ukosena slova </em><br>
    <mark>Markiranje (oznacavanje slova)</mark><br>
    <small>smanjuje slova teksta</small><br>
    <del>crta preko teksta</del><br>
    <ins>izmjenjeni ili uneseni tekst</ins><br>
    H<sub>2</sub>O<br>
    2<sup>2*(5*4)</sup><br>


</body>
</html>
